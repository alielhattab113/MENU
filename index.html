<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOODLEZOO</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
scroll-behavior:smooth;
}

body{
background:#000;
overflow-x:hidden;
}

/* HERO */

.hero{

height:100vh;

background:url("cover.png") center center/cover no-repeat;

position:relative;

display:flex;

justify-content:center;

align-items:center;

}

.hero::before{

content:"";

position:absolute;

inset:0;

background:linear-gradient(to bottom,
rgba(0,0,0,.15),
rgba(0,0,0,.65));

}

/* CONTENT */

.content{

position:relative;

z-index:2;

text-align:center;

animation:fade 1.5s;

}

.menu-btn{

display:inline-block;

margin-top:280px;

padding:20px 60px;

background:#ff7a00;

color:#fff;

text-decoration:none;

font-size:24px;

font-weight:bold;

border-radius:60px;

letter-spacing:1px;

box-shadow:0 0 30px rgba(255,122,0,.55);

transition:.35s;

animation:pulse 2s infinite;

}

.menu-btn:hover{

transform:translateY(-3px) scale(1.05);

background:#ff8b1f;

box-shadow:0 0 40px rgba(255,122,0,.9);

}

@keyframes pulse{

0%{

transform:scale(1);

}

50%{

transform:scale(1.05);

}

100%{

transform:scale(1);

}

}

@keyframes fade{

from{

opacity:0;

transform:translateY(30px);

}

to{

opacity:1;

transform:translateY(0);

}

}

/* PDF */

#menu{

background:#111;

padding:25px;

}

iframe{

width:100%;

height:100vh;

border:none;

border-radius:18px;

}

@media(max-width:768px){

.menu-btn{

margin-top:220px;

font-size:20px;

padding:18px 45px;

}

}

</style>

</head>

<body>

<section class="hero">

<div class="content">

<a href="#menu" class="menu-btn">
🍜 VIEW MENU
</a>

</div>

</section>

<section id="menu">

<iframe src="MENU%20NOODLEZOO.pdf"></iframe>

</section>

</body>
</html>
