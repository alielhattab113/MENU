<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noodlezoo Menu</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
background:url("cover.png") center center;
background-size:cover;
background-repeat:no-repeat;
display:flex;
justify-content:center;
align-items:flex-end;
}

.overlay{
width:100%;
height:100%;
background:linear-gradient(to top,rgba(0,0,0,.80),rgba(0,0,0,.15));
display:flex;
justify-content:center;
align-items:flex-end;
padding-bottom:60px;
}

.menu-btn{
background:#D4AF37;
color:#111;
text-decoration:none;
padding:18px 45px;
font-size:24px;
font-weight:bold;
border-radius:50px;
transition:.3s;
box-shadow:0 8px 25px rgba(0,0,0,.35);
}

.menu-btn:hover{
transform:scale(1.05);
}

.whatsapp{
position:fixed;
right:20px;
bottom:20px;
width:60px;
height:60px;
background:#25D366;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
text-decoration:none;
font-size:30px;
color:#fff;
box-shadow:0 5px 20px rgba(0,0,0,.4);
}

</style>

</head>
