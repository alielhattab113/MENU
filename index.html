<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOODLEZOO</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:
linear-gradient(rgba(0,0,0,.72),rgba(0,0,0,.85)),
url("cover.png") center center/cover no-repeat fixed;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:25px;

}

.container{

width:100%;
max-width:430px;

animation:fade .8s ease;

}

.logo{
display:flex;
justify-content:center;
align-items:center;
margin-bottom:35px;
}

.logo img{
display:block;
width:170px;
border:none;
outline:none;
background:transparent;
box-shadow:none;
filter:drop-shadow(0 0 18px rgba(255,140,0,.35));
}

.logo img{

width:170px;
filter:drop-shadow(0 0 18px rgba(255,140,0,.35));

}

.card{

display:flex;
align-items:center;

gap:20px;

padding:22px;

margin-bottom:22px;

border-radius:22px;

text-decoration:none;

background:rgba(255,255,255,.08);

backdrop-filter:blur(18px);

border:1px solid rgba(255,140,0,.35);

box-shadow:0 10px 30px rgba(0,0,0,.35);

transition:.35s;

}

.card:hover{

transform:translateY(-6px) scale(1.02);

border-color:#ff8c00;

box-shadow:0 15px 35px rgba(255,140,0,.28);

}

.icon{

width:72px;
height:72px;

border-radius:18px;

display:flex;
justify-content:center;
align-items:center;

font-size:34px;

flex-shrink:0;

}

.menu{

background:rgba(255,140,0,.12);
color:#ff9800;

}

.whatsapp{

background:rgba(37,211,102,.12);
color:#25D366;

}

.instagram{

background:rgba(255,255,255,.08);

}

.instagram i{

background:linear-gradient(45deg,#833AB4,#E1306C,#FCAF45);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.text h2{

color:#fff;

font-size:24px;

font-weight:600;

margin-bottom:5px;

}

.text p{

color:#ffb04d;

font-size:15px;

}

.footer{

text-align:center;

margin-top:15px;

color:#bdbdbd;

font-size:13px;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(30px);

}

to{

opacity:1;
transform:translateY(0);

}

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

<img src="logo.png" alt="NOODLEZOO">

</div>
<a href="MENU%20NOODLEZOO.pdf" target="_blank" class="card">

<div class="icon menu">
<i class="fa-solid fa-utensils"></i>
</div>

<div class="text">
<h2>Online Menu</h2>
<p>Tap to view</p>
</div>

</a>

<a href="https://wa.me/971561065002" target="_blank" class="card">

<div class="icon whatsapp">
<i class="fa-brands fa-whatsapp"></i>
</div>

<div class="text">
<h2>WhatsApp</h2>
<p>Chat with us</p>
</div>

</a>

<a href="https://instagram.com/noodlezoo_" target="_blank" class="card">

<div class="icon instagram">
<i class="fa-brands fa-instagram"></i>
</div>

<div class="text">
<h2>Instagram</h2>
<p>Follow us</p>
</div>

</a>

<div class="footer">

New Shahama • Abu Dhabi

</div>

</div>

</body>
</html>
