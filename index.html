<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOODLEZOO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:
linear-gradient(rgba(0,0,0,.60),rgba(0,0,0,.82)),
url("cover.png") center center/cover no-repeat fixed;

min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:25px;

}

.container{

width:100%;
max-width:430px;

animation:fade .8s ease;

}

.card{

display:flex;
align-items:center;
justify-content:space-between;

padding:22px;

margin-bottom:18px;

text-decoration:none;

border-radius:24px;

background:rgba(18,18,18,.82);

backdrop-filter:blur(16px);

border:1px solid rgba(255,140,0,.35);

box-shadow:0 10px 30px rgba(0,0,0,.40);

transition:.35s;

position:relative;
overflow:hidden;

}

.card::before{

content:"";

position:absolute;

top:0;
left:-120%;

width:70%;
height:100%;

background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,.18),
transparent);

transform:skewX(-25deg);

transition:.8s;

}

.card:hover::before{

left:160%;

}

.card:hover{

transform:translateY(-5px);

box-shadow:0 15px 40px rgba(255,140,0,.25);

border-color:#ff9800;

}

.left{

display:flex;
align-items:center;
gap:18px;

}

.icon{

width:72px;
height:72px;

border-radius:20px;

display:flex;
justify-content:center;
align-items:center;

font-size:34px;

flex-shrink:0;

}

.menu{

background:rgba(255,140,0,.15);
color:#ff9800;

}

.talabat{

background:#ff6b00;
color:#fff;

}

.whatsapp{

background:rgba(37,211,102,.18);
color:#25D366;

}

.instagram{

background:#2b2b2b;

}

.instagram i{

background:linear-gradient(45deg,#833AB4,#E1306C,#FCAF45);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.text h2{

color:#fff;
font-size:24px;
font-weight:600;

}

.text p{

color:#ffb04d;
margin-top:5px;

}

.arrow{

font-size:24px;
color:#ff9800;

}

.footer{

margin-top:18px;
text-align:center;
color:#aaa;
font-size:13px;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<div class="container">
<!-- Online Menu -->

<a href="MENU%20NOODLEZOO.pdf" target="_blank" class="card">

<div class="left">

<div class="icon menu">
<i class="fa-solid fa-utensils"></i>
</div>

<div class="text">
<h2>Online Menu</h2>
<p>Tap to view</p>
</div>

</div>

<div class="arrow">
<i class="fa-solid fa-chevron-right"></i>
</div>

</a>


<a href="https://www.talabat.com/uae/noodlezoo" target="_blank" class="card">

<div class="left">

<div class="icon talabat">
<i class="fa-solid fa-motorcycle"></i>
</div>

<div class="text">
<h2>Talabat</h2>
<p>Order now</p>
</div>

</div>

<div class="arrow">
<i class="fa-solid fa-chevron-right"></i>
</div>

</a>
<!-- WhatsApp -->

<a href="https://wa.me/971561065002" target="_blank" class="card">

<div class="left">

<div class="icon whatsapp">
<i class="fa-brands fa-whatsapp"></i>
</div>

<div class="text">
<h2>WhatsApp</h2>
<p>Chat with us</p>
</div>

</div>

<div class="arrow">
<i class="fa-solid fa-chevron-right"></i>
</div>

</a>


<!-- Instagram -->

<a href="https://instagram.com/noodlezoo_" target="_blank" class="card">

<div class="left">

<div class="icon instagram">
<i class="fa-brands fa-instagram"></i>
</div>

<div class="text">
<h2>Instagram</h2>
<p>Follow us</p>
</div>

</div>

<div class="arrow">
<i class="fa-solid fa-chevron-right"></i>
</div>

</a>


<div class="footer">

New Shahama • Abu Dhabi

</div>

</div>

</body>
</html>
