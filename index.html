<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOODLEZOO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.88)),
url("cover.png") center center/cover no-repeat fixed;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:22px;

}

.container{

width:100%;
max-width:430px;

animation:fade .8s;

}

.card{

position:relative;
overflow:hidden;

display:flex;
justify-content:space-between;
align-items:center;

padding:22px;

margin-bottom:18px;

border-radius:24px;

text-decoration:none;

background:rgba(18,18,18,.82);

backdrop-filter:blur(18px);

border:1px solid rgba(255,140,0,.28);

box-shadow:0 12px 30px rgba(0,0,0,.45);

transition:.35s;

}

.card:hover{

transform:translateY(-5px);

border-color:#ff9800;

box-shadow:0 0 18px rgba(255,152,0,.30);

}

.card::before{

content:"";

position:absolute;

top:0;
left:-120%;

width:70%;
height:100%;

background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,.18),
transparent);

transform:skewX(-25deg);

transition:.8s;

}

.card:hover::before{

left:170%;

}

.left{

display:flex;
align-items:center;
gap:18px;

}

.icon{

width:70px;
height:70px;

border-radius:20px;

display:flex;
justify-content:center;
align-items:center;

font-size:30px;

flex-shrink:0;

}

.menu{
background:rgba(255,140,0,.15);
color:#ff9800;
}

.talabat{
background:linear-gradient(135deg,#ff6b00,#ff8c00);
color:white;
}

.whatsapp{
background:rgba(37,211,102,.18);
color:#25D366;
}

.instagram{
background:#2d2d2d;
}

.instagram i{

background:linear-gradient(45deg,#833AB4,#E1306C,#FCAF45);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}

.text h2{

color:#fff;

font-size:23px;

}

.text p{

color:#ffb04d;

margin-top:4px;

font-size:14px;

}
.arrow{

width:48px;
height:48px;

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

background:rgba(255,152,0,.08);

border:2px solid rgba(255,152,0,.45);

color:#ff9800;

box-shadow:0 0 10px rgba(255,152,0,.30);

transition:.35s;

}

.card:hover .arrow{

background:#ff9800;

color:#fff;

border-color:#ff9800;

box-shadow:
0 0 12px #ff9800,
0 0 28px rgba(255,152,0,.8),
0 0 45px rgba(255,152,0,.45);

transform:translateX(6px);

}

.footer{

text-align:center;

color:#9d9d9d;

margin-top:12px;

font-size:13px;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(25px);

}

to{

opacity:1;
transform:translateY(0);

}

}

</style>

</head>

<body>

<div class="container">


<a href="MENU%20NOODLEZOO.pdf" target="_blank" class="card">

<div class="left">

<div class="icon menu">
<i class="fa-solid fa-utensils"></i>
</div>

<div class="text">
<h2>Online Menu</h2>
<p>Tap to view</p>
</div>

</div>

<div class="arrow">
<i class="fa-solid fa-chevron-right"></i>
</div>

</a>


<a href="https://www.talabat.com/uae/noodlezoo" target="_blank" class="card">

    <div class="left">

        <div class="icon talabat">
            <img src="talabat.png" alt="Talabat">
        </div>

        <div class="text">
            <h2>Talabat</h2>
            <p>Order now</p>
        </div>

    </div>

    <div class="arrow">
        <i class="fa-solid fa-chevron-right"></i>
    </div>

</a>
<!-- WhatsApp -->

<a href="https://wa.me/971561065002" target="_blank" class="card">

<div class="left">

<div class="icon whatsapp">
<i class="fa-brands fa-whatsapp"></i>
</div>

<div class="text">
<h2>WhatsApp</h2>
<p>Chat with us</p>
</div>

</div>

<div class="arrow">
<i class="fa-solid fa-chevron-right"></i>
</div>

</a>


<!-- Instagram -->

<a href="https://instagram.com/noodlezoo_" target="_blank" class="card">

<div class="left">

<div class="icon instagram">
<i class="fa-brands fa-instagram"></i>
</div>

<div class="text">
<h2>Instagram</h2>
<p>Follow us</p>
</div>

</div>

<div class="arrow">
<i class="fa-solid fa-chevron-right"></i>
</div>

</a>


<div class="footer">

🍜 NOODLEZOO<br>
New Shahama • Abu Dhabi

</div>

</div>

</body>
</html>
