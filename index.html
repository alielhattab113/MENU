<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOODLEZOO</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#000;
overflow:hidden;
}

.hero{
position:relative;
width:100%;
height:100vh;
background:url("cover.png") center center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to bottom,
rgba(0,0,0,.15),
rgba(0,0,0,.55));
}

.content{
position:relative;
z-index:2;
text-align:center;
animation:fade 1.2s ease;
}

.menu-btn{
display:inline-block;
margin-top:260px;
padding:18px 60px;
background:linear-gradient(45deg,#ff7a00,#ff9d00);
color:#fff;
text-decoration:none;
font-size:24px;
font-weight:bold;
border-radius:60px;
box-shadow:0 10px 35px rgba(255,122,0,.45);
transition:.3s;
animation:pulse 2s infinite;
}

.menu-btn:hover{
transform:scale(1.06);
box-shadow:0 10px 45px rgba(255,122,0,.8);
}

.arrow{
margin-top:20px;
font-size:34px;
color:#fff;
animation:bounce 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

@keyframes bounce{
0%{transform:translateY(0);}
50%{transform:translateY(10px);}
100%{transform:translateY(0);}
}

@keyframes fade{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="hero">

<div class="content">

<a href="MENU%20NOODLEZOO.pdf" target="_blank" class="menu-btn">
🍜 EXPLORE OUR MENU
</a>

<div class="arrow">
⌄
</div>

</div>

</div>

</body>
</html>
