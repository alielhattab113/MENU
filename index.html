<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOODLEZOO</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:#000;
overflow:hidden;
}

.hero{

width:100%;
height:100vh;

background:url("cover.png") center center/cover no-repeat;

display:flex;

justify-content:center;

align-items:center;

position:relative;

}

.hero::before{

content:"";

position:absolute;

left:0;
top:0;

width:100%;
height:100%;

background:linear-gradient(to bottom,
rgba(0,0,0,.15),
rgba(0,0,0,.55));

}

.content{

position:relative;

z-index:10;

text-align:center;

animation:fade 1.3s ease;

}

.menu-btn{

display:inline-block;

margin-top:250px;

padding:18px 55px;

background:#ff7a00;

color:#fff;

font-size:24px;

font-weight:bold;

text-decoration:none;

border-radius:60px;

box-shadow:0 0 30px rgba(255,122,0,.45);

transition:.3s;

animation:pulse 2s infinite;

}

.menu-btn:hover{

transform:scale(1.05);

background:#ff8f1f;

}

.arrow{

margin-top:25px;

font-size:40px;

color:white;

animation:down 1.5s infinite;

}

@keyframes pulse{

0%{transform:scale(1);}

50%{transform:scale(1.05);}

100%{transform:scale(1);}

}

@keyframes down{

0%{transform:translateY(0);}

50%{transform:translateY(10px);}

100%{transform:translateY(0);}

}

@keyframes fade{

from{

opacity:0;

transform:translateY(40px);

}

to{

opacity:1;

transform:translateY(0);

}

}

</style>

</head>

<body>

<section class="hero">

<div class="content">

<a href="menu.html" class="menu-btn">

🍜 EXPLORE OUR MENU

</a>

<div class="arrow">

⌄

</div>

</div>

</section>

</body>
</html>
